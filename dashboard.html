<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
</head>
<body>
  <h1>Welcome to Dashboard 🎉</h1>
  <button onclick="logout()">Logout</button>

  <script>
    function logout() {
      localStorage.removeItem("isLoggedIn");
      window.location.href = "index.html";
    }

    // Protect page
    if (!localStorage.getItem("isLoggedIn")) {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
